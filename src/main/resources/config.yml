# ============================================
# SCHOOLMINER CONFIG
# ============================================

# ===== AUTO MINE =====
automine:
  # Thời gian đào 1 lần (ticks, 20 ticks = 1 giây)
  # Mặc định: 20 ticks = 1 giây
  delay: 20
  
  # Phạm vi đào tối đa
  max-range: 5

# Danh sách block được phép đào
whitelist:
  - STONE
  - DEEPSLATE
  - COAL_ORE
  - IRON_ORE
  - GOLD_ORE
  - DIAMOND_ORE
  - EMERALD_ORE
  - REDSTONE_ORE
  - LAPIS_ORE
  - NETHER_QUARTZ_ORE
  - NETHER_GOLD_ORE
  - ANCIENT_DEBRIS
  - DEEPSLATE_COAL_ORE
  - DEEPSLATE_IRON_ORE
  - DEEPSLATE_GOLD_ORE
  - DEEPSLATE_DIAMOND_ORE
  - DEEPSLATE_EMERALD_ORE
  - DEEPSLATE_REDSTONE_ORE
  - DEEPSLATE_LAPIS_ORE
  - GRANITE
  - DIORITE
  - ANDESITE
  - CALCITE
  - TUFF
  - OBSIDIAN
  - CRYING_OBSIDIAN
  - END_STONE

# ===== AUTO KILL =====
autokill:
  # Thời gian hồi đòn (ticks, 20 ticks = 1 giây)
  # Mặc định: 40 ticks = 2 giây
  attack-delay: 40
  
  # Khoảng cách tấn công (block)
  range: 3
  
  # Sát thương cơ bản
  base-damage: 4.0
  
  # Loại mob được tấn công
  kill-monster: true   # Zombie, Skeleton, Creeper, v.v...
  kill-animal: false   # Bò, Heo, Gà, v.v...
  kill-mob: true       # Các loại mob khác
  
  # Drop items khi kill
  drop-items: true
  
  # Drop XP khi kill
  drop-xp: true
  
  # XP nhận được khi kill
  xp-monster: 5
  xp-animal: 1
  xp-mob: 3

# ===== MESSAGES =====
messages:
  enabled: "&a✅ Đã bật Auto Mine! (Đào mỗi giây)"
  disabled: "&c⛔ Đã tắt Auto Mine!"
  kill-enabled: "&a⚔️ Đã bật Auto Kill!"
  kill-disabled: "&c⛔ Đã tắt Auto Kill!"
  no-permission: "&c❌ Bạn không có quyền sử dụng lệnh này!"
  reloaded: "&a🔄 Đã reload config thành công!"
  wrong-usage: "&c⚠️ Sai cú pháp! /schoolminer reload"

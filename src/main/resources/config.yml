# ===== AUTO MINE =====
automine:
  # Thời gian đào 1 lần (ticks, 20 ticks = 1 giây)
  delay: 20
  
  # Phạm vi đào tối đa (block)
  max-range: 5
  
  # Tự động nhặt item vào túi (true/false)
  auto-pickup: true
  
  # X2 số lượng item đào được (true/false)
  double-drop: true


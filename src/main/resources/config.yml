# ============================================
# SCHOOLMINER CONFIG
# ============================================

# ===== AUTO MINE =====
automine:
  delay: 20
  max-range: 5
  auto-pickup: true
  double-drop: true  # BẬT X2 ITEM

# ===== WHITELIST =====
whitelist:
  - STONE
  - DEEPSLATE
  - COAL_ORE
  - IRON_ORE
  - GOLD_ORE
  - DIAMOND_ORE
  - EMERALD_ORE
  - REDSTONE_ORE
  - LAPIS_ORE
  - NETHER_QUARTZ_ORE
  - NETHER_GOLD_ORE
  - ANCIENT_DEBRIS
  - DEEPSLATE_COAL_ORE
  - DEEPSLATE_IRON_ORE
  - DEEPSLATE_GOLD_ORE
  - DEEPSLATE_DIAMOND_ORE
  - DEEPSLATE_EMERALD_ORE
  - DEEPSLATE_REDSTONE_ORE
  - DEEPSLATE_LAPIS_ORE

# ===== AUTO KILL =====
autokill:
  attack-delay: 40
  range: 3
  base-damage: 4.0
  kill-monster: true
  kill-animal: false
  kill-mob: true
  drop-items: true
  drop-xp: true
  xp-monster: 5
  xp-animal: 1
  xp-mob: 3

# ===== AUTO CRAFT =====
autocraft:
  # Craft Gỗ (Oak -> Gỗ custom)
  go:
    display-name: "&6Gỗ Sồi &7→ &eGỗ Cao Cấp"
    glow: true
    materials:
      oak_wood:
        material: OAK_LOG
        amount: 8
    result:
      material: OAK_LOG
      amount: 1
      display-name: "&e✨ Gỗ Cao Cấp"
      lore:
        - "&7Tự động chế tạo từ gỗ sồi"
        - "&a✨ Hiệu ứng Glow!"
  
  # Craft Đá (Stone -> Đá custom)
  da:
    display-name: "&7Đá &7→ &fĐá Tinh Khiết"
    glow: true
    materials:
      stone:
        material: STONE
        amount: 8
    result:
      material: STONE
      amount: 1
      display-name: "&f💎 Đá Tinh Khiết"
      lore:
        - "&7Tự động chế tạo từ đá"
        - "&a✨ Hiệu ứng Glow!"
  
  # Craft Kim Cương
  kimcuong:
    display-name: "&bKim Cương &7→ &b💎 Kim Cương Hoàn Hảo"
    glow: true
    materials:
      diamond:
        material: DIAMOND
        amount: 4
    result:
      material: DIAMOND
      amount: 1
      display-name: "&b💎 Kim Cương Hoàn Hảo"
      lore:
        - "&7Tự động chế tạo từ kim cương"
        - "&a✨ Hiệu ứng Glow!"
  
  # Craft Sắt
  sat:
    display-name: "&fSắt &7→ &f🔩 Sắt Tinh Luyện"
    glow: true
    materials:
      iron_ingot:
        material: IRON_INGOT
        amount: 8
    result:
      material: IRON_INGOT
      amount: 1
      display-name: "&f🔩 Sắt Tinh Luyện"
      lore:
        - "&7Tự động chế tạo từ sắt"
        - "&a✨ Hiệu ứng Glow!"
  
  # Craft Vàng
  vang:
    display-name: "&eVàng &7→ &e⭐ Vàng Nguyên Chất"
    glow: true
    materials:
      gold_ingot:
        material: GOLD_INGOT
        amount: 8
    result:
      material: GOLD_INGOT
      amount: 1
      display-name: "&e⭐ Vàng Nguyên Chất"
      lore:
        - "&7Tự động chế tạo từ vàng"
        - "&a✨ Hiệu ứng Glow!"

# ===== MESSAGES =====
messages:
  enabled: "&a✅ Đã bật Auto Mine! (x2 item)"
  disabled: "&c⛔ Đã tắt Auto Mine!"
  kill-enabled: "&a⚔️ Đã bật Auto Kill!"
  kill-disabled: "&c⛔ Đã tắt Auto Kill!"
  no-permission: "&c❌ Bạn không có quyền sử dụng lệnh này!"
  reloaded: "&a🔄 Đã reload config thành công!"
  wrong-usage: "&c⚠️ Sai cú pháp! /schoolminer reload"
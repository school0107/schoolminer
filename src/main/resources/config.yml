# ===== AUTO KILL =====
autokill:
  attack-delay: 25
  range: 3
  base-damage: 4.0
  kill-monster: true
  kill-animal: false
  kill-mob: true
  drop-items: true
  drop-xp: true
  xp-monster: 5
  xp-animal: 1
  xp-mob: 3
  upgrades:
    max-level: 10
    levels:
      '0':
        chance: 0.0
        radius: 0.0
        cost: 0.0
      '1':
        chance: 0.05
        radius: 1.0
        cost: 1000.0
      '2':
        chance: 0.1
        radius: 1.5
        cost: 2000.0
      '3':
        chance: 0.15
        radius: 2.0
        cost: 4000.0
      '4':
        chance: 0.2
        radius: 2.5
        cost: 6000.0
      '5':
        chance: 0.25
        radius: 3.0
        cost: 10000.0
      '6':
        chance: 0.3
        radius: 3.5
        cost: 15000.0
      '7':
        chance: 0.35
        radius: 4.0
        cost: 20000.0
      '8':
        chance: 0.4
        radius: 4.5
        cost: 30000.0
      '9':
        chance: 0.45
        radius: 5.0
        cost: 40000.0
      '10':

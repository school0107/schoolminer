# ===== AUTO KILL =====
autokill:
  # Thời gian hồi đòn (ticks, 20 ticks = 1 giây)
  attack-delay: 40
  
  # Khoảng cách tấn công (block)
  range: 3
  
  # Sát thương cơ bản
  base-damage: 4.0
  
  # Loại mob được tấn công
  kill-monster: true
  kill-animal: false
  kill-mob: true
  
  # Drop items khi kill
  drop-items: true
  
  # Drop XP khi kill
  drop-xp: true
  
  # XP nhận được khi kill
  xp-monster: 5
  xp-animal: 1
  xp-mob: 3

# ===== AUTO CRAFT =====

    default: op
  schoolminer.autocraft.ngoc_luc_bao:
    description: Cho phép craft ngọc lục bảo
    default: op
  schoolminer.autocraft.da_nether:
    description: Cho phép craft đá nether
    default: op
  schoolminer.autocraft.manh_vo_co_dai:

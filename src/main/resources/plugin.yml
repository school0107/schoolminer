name: Schoolminer
version: 1.0.0
main: com.schoolminer.Schoolminer
api-version: 1.21
author: school0107
description: Auto mine, auto kill and autocraft plugin with upgrades
depend: [Vault]
softdepend: [MythicMobs]
commands:
  automine:
    description: Tự động đào block
    usage: /automine
  autokill:
    description: Tự động tấn công mob
    usage: /autokill [upgrade]
  autocraft:
    description: Tự động chế tạo
    usage: /autocraft <type> [off]
  schoolminer:
    description: Quản lý plugin
    usage: /schoolminer <reload|help|mutiblock|add>

permissions:
  schoolminer.automine:
    description: Cho phép sử dụng /automine
    default: true
  schoolminer.autokill:
    description: Cho phép sử dụng /autokill
    default: true
  schoolminer.autocraft:
    description: Cho phép sử dụng /autocraft
    default: true
  schoolminer.admin:
    description: Quyền admin
    default: op
  
  schoolminer.range.1:
    description: Phạm vi đào 1 block
    default: true
  schoolminer.range.2:
    description: Phạm vi đào 2 block
    default: true
  schoolminer.range.3:
    description: Phạm vi đào 3 block
    default: true
  schoolminer.range.4:
    description: Phạm vi đào 4 block
    default: true
  schoolminer.range.5:
    description: Phạm vi đào 5 block
    default: true

  schoolminer.autocraft.go:
    description: Cho phép craft gỗ
    default: op
  schoolminer.autocraft.da:
    description: Cho phép craft đá
    default: op
  schoolminer.autocraft.kimcuong:
    description: Cho phép craft kim cương
    default: op
  schoolminer.autocraft.sat:
    description: Cho phép craft sắt
    default: op
  schoolminer.autocraft.vang:
    description: Cho phép craft vàng
    default: op
  schoolminer.autocraft.da_cuoi:
    description: Cho phép craft đá cuội
    default: op
  schoolminer.autocraft.than_cui:
